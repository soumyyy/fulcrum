version: "v1"

dataset:
  id_columns:
    - company_name
    - cin
    - financial_year
    - cohort
    - sector
  label_column: target_wilful_default
  categorical_columns:
    - sector
  drop_raw_text_columns:
    - opinion_type
    - auditor_name
  exclude_direct_columns:
    - related_party_transactions_amount
    - rpt_to_revenue_ratio
    - rpt_count
    - pending_legal_cases_count
    - capex
    - promoter_holding_pct
    - promoter_holding_pct_yoy
    - promoter_holding_pct_trend_3y
    - promoter_holding_pct_volatility_3y
    - going_concern_uncertainty
    - emphasis_of_matter
    - fraud_reported
    - contingent_liabilities_amount

preprocessing:
  numeric_imputer: median
  correlation_threshold: 0.90

splits:
  train_companies: 70
  validation_companies: 15
  test_companies: 15
  random_seed: 42

threshold_policy:
  start: 0.10
  stop: 0.90
  step: 0.01
  target_recall: 0.75

models:
  logistic_regression:
    enabled: true
    C_grid: [0.1, 1.0, 10.0]
  random_forest:
    enabled: true
    n_estimators: [200, 300]
    max_depth: [10, 15]
    min_samples_leaf: [1, 2, 4]
    max_features: ["sqrt", 0.5]
  hist_gradient_boosting:
    enabled: true
    learning_rate: [0.05, 0.1]
    max_depth: [3, 5]
    max_iter: [200, 300]
    min_samples_leaf: [10, 20]

artifacts:
  model_dir: artifacts/models
  report_dir: artifacts/reports
  production_alias_file: artifacts/models/production_model.json
